name: Daily Lead Scraper

# Din mein 2 baar chalne ka logic (Har 12 ghante mein)
on:
  schedule:
    - cron: '0 0,12 * * *'  # Runs at 00:00 and 12:00 UTC everyday
  workflow_dispatch:        # Isse aap GitHub se manually click karke bhi run kar sakte hain

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Scraper Script
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add emails/ progress.json
          # Agar naya data mila hai tabhi commit karega, warna skip karega
          git commit -m "Auto-update: Scraped new emails [skip ci]" || echo "No changes to commit"
          git push
