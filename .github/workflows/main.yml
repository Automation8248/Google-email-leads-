name: Bing Lead Scraper Bot

on:
  schedule:
    # Yeh script ko din mein do baar run karega (12:00 AM aur 12:00 PM UTC par)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Isse aap GitHub se manually play button daba kar chala sakte hain

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Python Scraper
        run: python scraper.py

      - name: Commit and Push Results Forcefully
        run: |
          git config --global user.name "Scraper-Bot"
          git config --global user.email "bot@github.com"
          # -A command FORCEFULLY nayi, purani aur delete hui files ko add kar deti hai
          git add -A
          git commit -m "Auto-update: Extracted new Bing leads (JSON & CSV)" || echo "No new leads found to commit"
          git push
