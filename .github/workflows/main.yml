name: Google API Scraper Bot

on:
  schedule:
    # Yeh script ko din mein do baar run karega (Midnight aur Noon UTC)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Isse aap GitHub par button click karke bhi manually chala sakte hain

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Python Scraper
        run: python scraper.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "Scraper-Bot"
          git config --global user.email "bot@github.com"
          git add leads_output/ progress.json
          git commit -m "Auto-update: Scraped new leads (JSON & CSV)" || echo "No new leads found to commit"
          git push
